<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MediCare | Hospital Management System</title>
    <!-- Chart.js CDN for analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
        }

        :root {
            --bg-page: #f4f8fc;
            --card-bg: #ffffff;
            --text-primary: #1e2a3e;
            --text-secondary: #4a627a;
            --primary: #0b6e4f;
            --primary-light: #2c8c6e;
            --primary-soft: #e0f2e9;
            --danger: #e05a5a;
            --warning: #f4b942;
            --info: #2c7da0;
            --border: #e2e8f0;
            --sidebar-bg: #ffffff;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        }

        body.dark {
            --bg-page: #121826;
            --card-bg: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --border: #334155;
            --sidebar-bg: #0f172a;
            --primary-soft: #1e3a2f;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        body {
            background: var(--bg-page);
            color: var(--text-primary);
            font-weight: 400;
        }

        /* Layout & Common */
        .app-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            padding: 2rem 1rem;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 10;
            transform: translateX(0);
            transition: transform 0.3s;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 1.5rem 2rem;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 2rem;
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--primary);
        }

        .logo-area i {
            font-size: 2rem;
        }

        .nav-links {
            list-style: none;
        }

        .nav-links li {
            margin: 1rem 0;
        }

        .nav-links a {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.7rem 1rem;
            border-radius: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            transition: 0.2s;
        }

        .nav-links a:hover, .nav-links .active-nav {
            background: var(--primary-soft);
            color: var(--primary);
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .grid-2, .grid-3 {
            display: grid;
            gap: 1.5rem;
        }

        .grid-2 { grid-template-columns: repeat(2,1fr); }
        .grid-3 { grid-template-columns: repeat(3,1fr); }

        @media (max-width: 800px) {
            .sidebar { transform: translateX(-100%); position: fixed; }
            .main-content { margin-left: 0; }
            .sidebar.open { transform: translateX(0); }
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
        }

        .btn {
            background: var(--primary);
            border: none;
            padding: 12px 20px;
            border-radius: 36px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text-primary);
        }
        /* auth pages */
        .auth-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #cfe9df, #b8dfd0);
        }
        .auth-card {
            width: 460px;
            max-width: 90%;
            background: var(--card-bg);
            border-radius: 32px;
            padding: 2rem;
        }

        .toggle-dark {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--card-bg);
            border-radius: 60px;
            padding: 10px 18px;
            cursor: pointer;
            z-index: 99;
            box-shadow: var(--shadow);
        }
        .profile-pic-place {
            width: 80px;
            height: 80px;
            background: var(--primary-soft);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary);
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .badge {
            background: var(--primary-soft);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        canvas { max-height: 220px; width: 100% !important; }
        @media (max-width: 600px) { .main-content { padding: 1rem; } }
    </style>
</head>
<body id="appRoot">
    <!-- Dynamic content injected via JS -->
    <div id="root"></div>
    <div class="toggle-dark" id="darkModeToggle"><i class="fas fa-moon"></i> Dark/Light</div>

    <script>
        // ---------- MOCK DATABASE (Simulated localStorage + patient data store) ----------
        let patientsDB = JSON.parse(localStorage.getItem('hms_patients')) || [];
        let appointmentsDB = JSON.parse(localStorage.getItem('hms_appointments')) || [];
        let medicalRecordsDB = JSON.parse(localStorage.getItem('hms_medical_records')) || [];
        let currentPatientId = localStorage.getItem('currentPatientId') || null;
        
        // Helper: Generate unique patient ID HS25001 .. HS25100
        function generatePatientId() {
            const existingIds = patientsDB.map(p => p.patientId).filter(id => id.startsWith('HS'));
            let num = 25001;
            while(existingIds.includes(`HS${num}`) && num <= 25100) num++;
            if(num > 25100) return "HS25100";
            return `HS${num}`;
        }
        
        // Preload demo doctors
        const doctorsList = [
            { id:1, name:"Dr. Emily Carter", dept:"Cardiology", qualification:"MD, FACC", experience:"12 years", availability:"Mon-Wed 9AM-1PM", email:"emily.carter@medicare.com", photo:"👩‍⚕️", fee:"$80" },
            { id:2, name:"Dr. James Wong", dept:"Neurology", qualification:"MD, PhD", experience:"15 years", availability:"Tue-Thu 10AM-3PM", email:"james.wong@medicare.com", photo:"🧑‍⚕️", fee:"$100" },
            { id:3, name:"Dr. Lisa Roy", dept:"Orthopedic", qualification:"MS Ortho", experience:"8 years", availability:"Mon-Fri 11AM-4PM", email:"lisa.roy@medicare.com", photo:"👩‍⚕️", fee:"$75" },
            { id:4, name:"Dr. Michael Lee", dept:"General Medicine", qualification:"MD", experience:"20 years", availability:"Daily 8AM-12PM", email:"michael.lee@medicare.com", photo:"🧑‍⚕️", fee:"$70" },
            { id:5, name:"Dr. Sophia Patel", dept:"Pediatrics", qualification:"MBBS, DCH", experience:"6 years", availability:"Mon, Wed, Fri 1PM-5PM", email:"sophia.patel@medicare.com", photo:"👩‍⚕️", fee:"$65" }
        ];
        
        function initDemoData() {
            if(patientsDB.length === 0) {
                const demoPatient = {
                    id: "p1", fullName: "John Doe", email: "john@example.com", mobile: "9876543210", age: 32, gender: "Male", bloodGroup: "O+", department: "Cardiology",
                    patientId: "HS25001", password: "pass123", medicalStatus: "Stable", profilePhoto: "👨‍🦱"
                };
                patientsDB.push(demoPatient);
                appointmentsDB.push({ id: "a1", patientId: "HS25001", doctorId: 1, date: "2025-05-25", time: "10:30 AM", status: "Confirmed" });
                medicalRecordsDB.push({ patientId: "HS25001", history: "Routine checkup, BP normal", reports: "ECG normal", bpHistory: [118,122,120], sugarHistory: [92,95,98], heartRate: [72,74,71] });
                localStorage.setItem('hms_patients', JSON.stringify(patientsDB));
                localStorage.setItem('hms_appointments', JSON.stringify(appointmentsDB));
                localStorage.setItem('hms_medical_records', JSON.stringify(medicalRecordsDB));
            }
        }
        initDemoData();
        
        // Authentication helpers
        function loginUser(email, pass) {
            const patient = patientsDB.find(p => p.email === email && p.password === pass);
            if(patient) { currentPatientId = patient.patientId; localStorage.setItem('currentPatientId', currentPatientId); return true; }
            return false;
        }
        function registerUser(data) {
            if(patientsDB.some(p => p.email === data.email)) return false;
            const patientId = generatePatientId();
            const newPatient = { ...data, patientId, id: Date.now()+"" };
            patientsDB.push(newPatient);
            localStorage.setItem('hms_patients', JSON.stringify(patientsDB));
            medicalRecordsDB.push({ patientId, history: "Initial checkup - No records", reports: "Pending", bpHistory: [120], sugarHistory: [90], heartRate: [75] });
            localStorage.setItem('hms_medical_records', JSON.stringify(medicalRecordsDB));
            return newPatient;
        }
        function getCurrentPatient() { return patientsDB.find(p => p.patientId === currentPatientId); }
        function getPatientAppointments() { return appointmentsDB.filter(a => a.patientId === currentPatientId); }
        function getMedicalData() { return medicalRecordsDB.find(m => m.patientId === currentPatientId); }
        function addAppointment(appt) { appointmentsDB.push({...appt, id: Date.now()+""}); localStorage.setItem('hms_appointments', JSON.stringify(appointmentsDB)); }
        
        // Global state & UI render
        let currentView = "dashboard"; // login, signup, dashboard, appointments, doctors, profile, records-analytics
        function navigate(view) { currentView = view; renderApp(); }
        
        // Dark mode toggle
        let darkMode = localStorage.getItem('darkMode') === 'true';
        function applyTheme() { if(darkMode) document.body.classList.add('dark'); else document.body.classList.remove('dark'); localStorage.setItem('darkMode', darkMode); }
        document.getElementById('darkModeToggle')?.addEventListener('click',()=>{ darkMode=!darkMode; applyTheme(); renderApp(); });
        
        // Main render
        function renderApp() {
            const root = document.getElementById('root');
            if(!root) return;
            if(!currentPatientId && currentView !== "signup") { currentView = "login"; }
            if(currentView === "login") root.innerHTML = renderLoginPage();
            else if(currentView === "signup") root.innerHTML = renderSignupPage();
            else if(currentPatientId) {
                root.innerHTML = renderMainLayout();
                attachSidebarEvents();
                attachContentByView();
                if(currentView === "dashboard") renderDashboardContent();
                if(currentView === "appointments") renderAppointmentsContent();
                if(currentView === "doctors") renderDoctorsContent();
                if(currentView === "profile") renderProfileContent();
                if(currentView === "records-analytics") renderMedicalAnalytics();
            } else { currentView = "login"; renderApp(); }
            applyTheme();
        }
        
        function renderLoginPage() {
            return `<div class="auth-wrapper">
                <div class="auth-card">
                    <div style="text-align:center"><i class="fas fa-hospital-user" style="font-size:48px;color:var(--primary)"></i><h2>MediCare HMS</h2></div>
                    <div class="form-group"><label>Email / Patient ID</label><input type="text" id="loginEmail" placeholder="john@example.com or HS25001"></div>
                    <div class="form-group"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••"></div>
                    <button class="btn" style="width:100%" id="loginBtn">Login</button>
                    <div class="flex-between" style="margin-top:1rem"><a href="#" id="forgotLink" style="font-size:0.85rem">Forgot Password?</a><button class="btn-outline btn" id="signupRedirectBtn">Create Account</button></div>
                </div>
            </div>`;
        }
        function renderSignupPage() {
            const departments = ["Cardiology","Neurology","Orthopedic","General Medicine","Pediatrics"];
            return `<div class="auth-wrapper"><div class="auth-card" style="max-width:500px"><h2><i class="fas fa-user-plus"></i> Sign Up</h2><form id="signupForm">
                <div class="form-group"><input type="text" id="fullName" placeholder="Full Name" required></div>
                <div class="form-group"><input type="email" id="email" placeholder="Email" required></div>
                <div class="form-group"><input type="tel" id="mobile" placeholder="Mobile Number" required></div>
                <div class="form-group"><input type="number" id="age" placeholder="Age" required></div>
                <div class="form-group"><select id="gender"><option>Male</option><option>Female</option><option>Other</option></select></div>
                <div class="form-group"><select id="bloodGroup"><option>A+</option><option>A-</option><option>B+</option><option>B-</option><option>O+</option><option>O-</option><option>AB+</option></select></div>
                <div class="form-group"><select id="department">${departments.map(d=>`<option>${d}</option>`).join('')}</select></div>
                <div class="form-group"><input type="password" id="password" placeholder="Password" required></div>
                <div class="form-group"><input type="password" id="confirmPassword" placeholder="Confirm Password" required></div>
                <button type="submit" class="btn" style="width:100%">Register</button>
                <p style="margin-top:1rem">Patient ID will be auto-generated (HS25001-HS25100)</p>
                <button type="button" id="backToLogin" class="btn-outline btn" style="margin-top:1rem">Back to Login</button>
            </form></div></div>`;
        }
        
        // Main layout after login
        function renderMainLayout() {
            const patient = getCurrentPatient();
            return `<div class="app-container"><div class="sidebar" id="sidebar"><div class="logo-area"><i class="fas fa-heartbeat"></i><span>MediCare HMS</span></div>
                <ul class="nav-links"><li><a href="#" data-nav="dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="#" data-nav="appointments"><i class="fas fa-calendar-check"></i> Appointments</a></li>
                <li><a href="#" data-nav="doctors"><i class="fas fa-user-md"></i> Doctors</a></li>
                <li><a href="#" data-nav="profile"><i class="fas fa-id-card"></i> My Profile</a></li>
                <li><a href="#" data-nav="records-analytics"><i class="fas fa-chart-line"></i> Medical Records</a></li>
                <li><a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a></li></ul>
                <div style="margin-top:2rem; font-size:0.8rem; text-align:center;">Patient ID: ${patient?.patientId}<br><i class="fas fa-bell"></i> Notifications: Upcoming reminders</div>
            </div><div class="main-content" id="mainContent"><div class="flex-between"><h2 id="pageTitle">Dashboard</h2><i class="fas fa-search" style="cursor:pointer" id="emergencyBtn" title="Emergency Contact: 102"></i></div><div id="dynamicView"></div></div></div>`;
        }
        
        function attachSidebarEvents() {
            document.querySelectorAll('.nav-links a[data-nav]').forEach(link => {
                link.addEventListener('click', (e) => { e.preventDefault(); currentView = link.getAttribute('data-nav'); renderApp(); });
            });
            const logout = document.getElementById('logoutBtn');
            if(logout) logout.addEventListener('click', ()=>{ localStorage.removeItem('currentPatientId'); currentPatientId=null; currentView="login"; renderApp(); });
            const emergency = document.getElementById('emergencyBtn');
            if(emergency) emergency.addEventListener('click',()=>alert("🚨 Emergency Contact: 102 | Hospital Helpline: 1800-123-HEAL"));
        }
        
        function attachContentByView() {
            if(currentView === "dashboard") renderDashboardContent();
            if(currentView === "appointments") renderAppointmentsContent();
            if(currentView === "doctors") renderDoctorsContent();
            if(currentView === "profile") renderProfileContent();
            if(currentView === "records-analytics") renderMedicalAnalytics();
        }
        
        function renderDashboardContent() {
            const p = getCurrentPatient();
            const appointments = getPatientAppointments();
            const upcoming = appointments.filter(a=>a.status !== "Completed");
            const container = document.getElementById('dynamicView');
            container.innerHTML = `<div class="grid-2"><div class="card"><div class="flex-between"><div><div class="profile-pic-place"><i class="fas fa-user-circle fa-3x"></i></div><h3>${p?.fullName}</h3><p>📧 ${p?.email}<br>📞 ${p?.mobile}<br>🏥 ${p?.department}<br>🆔 ${p?.patientId}<br>❤️ Medical Status: <span class="badge">${p?.medicalStatus || "Stable"}</span></p></div></div></div>
            <div class="card"><h3><i class="fas fa-calendar-alt"></i> Quick Actions</h3><button class="btn" id="bookQuickAppt">+ Book Appointment</button><div class="card" style="margin-top:1rem"><h4>Upcoming Appointments</h4>${upcoming.map(a=>`<p><b>${a.date} ${a.time}</b> - Dr.${doctorsList.find(d=>d.id===a.doctorId)?.name} (${a.status})</p>`).join('')||"No upcoming"}</div></div></div>
            <div class="card"><h3>Health Analytics Snapshot</h3><canvas id="bpChartSnap" height="150"></canvas></div>`;
            const med = getMedicalData();
            if(med && med.bpHistory) setTimeout(()=>{ new Chart(document.getElementById('bpChartSnap'),{ type:'line', data:{ labels:['Last 1','Last 2','Last 3'], datasets:[{label:'BP Systolic',data:med.bpHistory,borderColor:'#0b6e4f'}] } }); },100);
            document.getElementById('bookQuickAppt')?.addEventListener('click',()=>{ currentView = "appointments"; renderApp(); });
        }
        
        function renderAppointmentsContent() {
            const appointments = getPatientAppointments();
            const doctors = doctorsList;
            const container = document.getElementById('dynamicView');
            container.innerHTML = `<div class="card"><h2>📅 Book New Appointment</h2><div class="grid-2"><div class="form-group"><label>Date</label><input type="date" id="apptDate"></div><div class="form-group"><label>Time</label><input type="time" id="apptTime"></div><div class="form-group"><label>Doctor</label><select id="apptDoctor">${doctors.map(d=>`<option value="${d.id}">${d.name} (${d.dept})</option>`).join('')}</select></div><div><button class="btn" id="confirmBookBtn">Confirm Booking</button></div></div></div>
            <div class="card"><h3>📋 Upcoming Appointments</h3>${appointments.filter(a=>a.status!=='Completed').map(a=>`<div class="flex-between"><div><b>${a.date} ${a.time}</b><br>${doctorsList.find(d=>d.id===a.doctorId)?.name}</div><span class="badge">${a.status}</span></div>`).join('')||'No upcoming'}</div>
            <div class="card"><h3>📜 Appointment History</h3>${appointments.filter(a=>a.status==='Completed').map(a=>`<div>${a.date} with Dr.${doctorsList.find(d=>d.id===a.doctorId)?.name} - Completed</div>`).join('')||'None'}</div>`;
            document.getElementById('confirmBookBtn')?.addEventListener('click',()=>{
                const date = document.getElementById('apptDate').value, time = document.getElementById('apptTime').value, docId = parseInt(document.getElementById('apptDoctor').value);
                if(date && time && docId) { addAppointment({ patientId:currentPatientId, doctorId:docId, date, time, status:"Confirmed" }); renderApp(); alert("Appointment booked!"); }
                else alert("Fill all fields");
            });
        }
        
        function renderDoctorsContent() {
            const container = document.getElementById('dynamicView');
            container.innerHTML = `<div class="grid-3">${doctorsList.map(doc=>`<div class="card"><div style="font-size:3rem">${doc.photo}</div><h3>${doc.name}</h3><p><i class="fas fa-stethoscope"></i> ${doc.dept}<br>📜 ${doc.qualification}<br>⏱️ ${doc.experience}<br>🕒 ${doc.availability}<br>📧 ${doc.email}<br>💰 ${doc.fee}</p><button class="btn bookDocBtn" data-docid="${doc.id}">Book Appointment</button></div>`).join('')}</div>`;
            document.querySelectorAll('.bookDocBtn').forEach(btn=>btn.addEventListener('click',(e)=>{
                const docId = parseInt(btn.dataset.docid);
                currentView = "appointments";
                renderApp();
                setTimeout(()=>{
                    const selectDoc = document.getElementById('apptDoctor');
                    if(selectDoc) selectDoc.value = docId;
                },100);
            }));
        }
        
        function renderProfileContent() {
            const p = getCurrentPatient();
            const container = document.getElementById('dynamicView');
            container.innerHTML = `<div class="card"><div class="flex-between"><h2>My Profile</h2><button class="btn-outline btn" id="editProfileBtn"><i class="fas fa-edit"></i> Edit</button></div>
            <div class="grid-2"><div><div class="profile-pic-place"><i class="fas fa-user-md fa-3x"></i></div><p><b>Photo:</b> ${p?.profilePhoto || "Default"}</p></div><div>
            <p><strong>Full Name:</strong> ${p?.fullName}</p><p><strong>Email:</strong> ${p?.email}</p><p><strong>Mobile:</strong> ${p?.mobile}</p><p><strong>Age:</strong> ${p?.age}</p><p><strong>Gender:</strong> ${p?.gender}</p><p><strong>Blood Group:</strong> ${p?.bloodGroup}</p><p><strong>Department:</strong> ${p?.department}</p><p><strong>Patient ID:</strong> ${p?.patientId}</p><p><strong>Medical History:</strong> ${getMedicalData()?.history || "No records"}</p><p><strong>Last Appointment:</strong> ${getPatientAppointments().slice(-1)[0]?.date || "None"}</p></div></div></div>`;
            document.getElementById('editProfileBtn')?.addEventListener('click',()=>{ alert("Edit profile feature (demo) - you could modify patient data."); });
        }
        
        function renderMedicalAnalytics() {
            const med = getMedicalData();
            const container = document.getElementById('dynamicView');
            container.innerHTML = `<div class="card"><h3>📊 Health Analytics Dashboard</h3><canvas id="lineChartBP" style="max-height:200px"></canvas><canvas id="sugarChart" style="max-height:200px"></canvas><div class="grid-2"><div><canvas id="heartBarChart"></canvas></div><div><h4>Test Reports</h4><p>Latest Report: ${med?.reports || "Normal ECG, Lipid profile pending"}</p><p>Medical History: ${med?.history || "No chronic conditions"}</p><button class="btn" id="viewFullReport">Download Summary</button></div></div></div>`;
            if(med) {
                const bp = med.bpHistory || [118,120,122];
                const sugar = med.sugarHistory || [92,95,98];
                const hr = med.heartRate || [72,74,71];
                setTimeout(()=>{
                    new Chart(document.getElementById('lineChartBP'),{ type:'line', data:{ labels:['Jan','Feb','Mar'], datasets:[{label:'BP Systolic', data:bp,borderColor:'#2c7da0'}] } });
                    new Chart(document.getElementById('sugarChart'),{ type:'line', data:{ labels:['Jan','Feb','Mar'], datasets:[{label:'Blood Sugar (mg/dL)', data:sugar,borderColor:'#f4b942'}] } });
                    new Chart(document.getElementById('heartBarChart'),{ type:'bar', data:{ labels:['Reading 1','Reading 2','Reading 3'], datasets:[{label:'Heart Rate (bpm)', data:hr,backgroundColor:'#0b6e4f'}] } });
                },100);
            }
            document.getElementById('viewFullReport')?.addEventListener('click',()=>alert("Medical report exported (demo): All vitals stable."));
        }
        
        // Event listeners for auth forms after render
        document.addEventListener('click', (e) => {
            if(e.target.id === 'loginBtn') {
                const email = document.getElementById('loginEmail')?.value;
                const pass = document.getElementById('loginPassword')?.value;
                if(loginUser(email,pass)) { currentView="dashboard"; renderApp(); }
                else alert("Invalid credentials or try demo: john@example.com / pass123");
            }
            if(e.target.id === 'signupRedirectBtn') navigate('signup');
            if(e.target.id === 'backToLogin') navigate('login');
            if(e.target.id === 'forgotLink') { alert("Reset link sent to registered email (demo)."); }
        });
        document.addEventListener('submit', (e) => {
            if(e.target.id === 'signupForm') {
                e.preventDefault();
                const form = e.target;
                const fullName = document.getElementById('fullName').value, email = document.getElementById('email').value, mobile = document.getElementById('mobile').value;
                const age = document.getElementById('age').value, gender = document.getElementById('gender').value, bloodGroup = document.getElementById('bloodGroup').value, department = document.getElementById('department').value, password = document.getElementById('password').value, confirm = document.getElementById('confirmPassword').value;
                if(password !== confirm) { alert("Passwords mismatch"); return; }
                const reg = registerUser({ fullName, email, mobile, age, gender, bloodGroup, department, password, medicalStatus:"Active" });
                if(reg) { alert(`Registration successful! Your Patient ID: ${reg.patientId}`); navigate('login'); }
                else alert("Email already exists!");
            }
        });
        // initial render
        window.onload = () => { applyTheme(); renderApp(); };
    </script>
